version: v1

labels:
  - label: '🔒 Security'
    matcher:
      title: '^(security|vuln(erability)?|secure|auth(entication)?|encrypt(ion)?): .*'

  - label: '⚡️ Performance'
    matcher:
      title: '^(perf(ormance)?|optimize|speed|cache): .*'

  - label: '🔄 Refactor'
    matcher:
      title: '^(refactor|restruct(ure)?|cleanup|rewrite): .*'

  - label: '🚀 Release'
    matcher:
      title: '^(release|version|deploy|publish): .*'

  - label: '📒 Documentation'
    matcher:
      title: '^(docs?|doc(umentation)?|readme): .*'

  - label: '☢️ Bug'
    matcher:
      title: '^(bug|fix(es)?|hotfix|race|missing|correct): .*'
        
