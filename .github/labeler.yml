version: v1

labels:
  - label: '🔒 Security'
    matcher:
      branch: '(?i)^(security|vuln(erability)?|secure|auth(entication)?|encrypt(ion)?)/.*'

  - label: '⚡ Performance'
    matcher:
      branch: '(?i)^(perf(ormance)?|optimize|speed|cache)/.*'

  - label: '🔄 Refactor'
    matcher:
      branch: '(?i)^(refactor|restruct(ure)?|cleanup|rewrite)/.*'

  - label: '🚀 Release'
    matcher:
      branch: '(?i)^(release|version|deploy|publish)/.*'

  - label: '📒 Documentation'
    matcher:
      branch: '(?i)^(docs?|doc(umentation)?|readme)/.*'

  - label: '☢️ Bug'
    matcher:
      branch: '(?i)^(bug|fix(es)?|hotfix|race|missing|correct)/.*'
        
  - label: '🧹 Updates'
    matcher:
      branch: '(?i)^(update|improve|chore|deprecated|remove|unused)/.*'
        
  - label: '🤖 Dependencies'
    matcher:
      branch: '(?i)^(dep(s)?|dependenc(y|ies)|bump)/.*'
        
  - label: '✏️ Feature'
    matcher:
      branch: '(?i)^(feat(ure)?|add|create|impl(ement)?)/.*'
        
  - label: '🔍 Testing'
    matcher:
      branch: '(?i)^(test(ing)?|unit|integration|e2e|coverage)/.*'
        
  # - label: '📊 Analytics'
