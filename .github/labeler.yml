    matcher:
      title: '^(analytics|metrics|logs|monitor|track): .*'
        
  - label: '🌍 Internationalization'
    matcher:
      title: '^(i18n|l10n|international|translate|locale|lang): .*'
        
  - label: '🛡️ Infrastructure'
    matcher:
      title: '^(infra(structure)?|ci|cd|docker|deploy|setup): .*'
        
  - label: '📚 Library'
    matcher:
      title: '^(lib(rary)?|module|package|export|import): .*'